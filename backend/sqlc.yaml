version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries"
    schema: "db/migrations"
    gen:
      go:
        package: "generated"
        out: "db/generated"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "vector"
            go_type:
              import: "github.com/pgvector/pgvector-go"
              type: "Vector"
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
